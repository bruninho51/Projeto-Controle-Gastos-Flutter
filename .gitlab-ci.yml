variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: "/certs"
  FLUTTER_VERSION: "3.41.1"  # Atualize para a versão do seu projeto

stages:
  - release   # 1. semantic-release → gera versão e salva em version.txt
  - build     # 2. container + android em paralelo

# ─────────────────────────────────────────────────────────────
# STAGE 1 — Release
# Roda o semantic-release, que determina a versão, cria a tag
# e a release no GitLab. Salva a versão em version.txt para os
# stages seguintes via artifacts.
# ─────────────────────────────────────────────────────────────
release:
  stage: release
  environment: production
  image: node:20-alpine
  before_script:
    - apk add --no-cache git curl
    - npm install
    - chmod +x ./ci_cd/prepare_release.sh
  script:
    - npm run release
  artifacts:
    paths:
      - version.txt      # gerado pelo .releaserc (ver comentário abaixo)
    expire_in: 1 hour
  only:
    refs:
      - main

# ─────────────────────────────────────────────────────────────
# STAGE 2a — Container (paralelo com android)
## Lê version.txt, atualiza deployment.yml,
## faz build e push da imagem Docker.
# ─────────────────────────────────────────────────────────────
container:
  stage: build
  environment: production
  image: docker:latest
  services:
    - docker:dind
  variables:
    DOCKER_HOST: tcp://docker:2376
    DOCKER_TLS_VERIFY: "1"
    DOCKER_CERT_PATH: "/certs/client"
  before_script:
    - apk add --no-cache git
  script:
    - chmod +x ./ci_cd/build_container.sh
    - ./ci_cd/build_container.sh
  only:
    refs:
      - main

# ─────────────────────────────────────────────────────────────
# STAGE 2b — Android (paralelo com container)
# Lê version.txt, compila o APK release e faz upload para o
# GitLab Generic Package Registry + Release Asset.
# ─────────────────────────────────────────────────────────────
android:
  stage: build
  environment: production
  image: ghcr.io/cirruslabs/flutter:${FLUTTER_VERSION}
  before_script:
    - |
      if command -v apt-get > /dev/null 2>&1; then
        apt-get update -qq
        apt-get install -y --no-install-recommends curl
      elif command -v apk > /dev/null 2>&1; then
        apk add --no-cache curl
      fi
    - flutter --version
    - flutter doctor --android-licenses || true
  script:
    - chmod +x ./ci_cd/build_android.sh
    - ./ci_cd/build_android.sh
  only:
    refs:
      - main